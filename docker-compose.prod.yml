services:
  db:
    image: mysql:8.0
    restart: always
    ports:
      - "127.0.0.1:3306:3306"
    environment:
      MYSQL_DATABASE: ${DB_NAME:-app}
      MYSQL_USER: ${DB_USER:-app_user}
      MYSQL_PASSWORD: ${DB_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - internal
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./api
      dockerfile: Dockerfile.prod
    restart: always
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: mysql://${DB_USER:-app_user}:${DB_PASSWORD}@db:3306/${DB_NAME:-app}?serverVersion=8.0.32&charset=utf8mb4
      DEFAULT_URI: ${DOMAIN_URL:-https://musmanager.com}
      APP_ENV: prod
      APP_DEBUG: 0
      APP_SECRET: ${APP_SECRET}
      MERCURE_URL: http://mercure:3000/.well-known/mercure
      MERCURE_PUBLIC_URL: https://musmanager.com/.well-known/mercure
      MERCURE_JWT_SECRET: ${MERCURE_JWT_SECRET}
      MAILER_DSN: ${MAILER_DSN}
    volumes:
      - api_var:/var/www/html/var
      - uploads_data:/var/www/html/public/uploads
    ports:
      - "8001:80"
    expose:
      - "80"
    networks:
      - internal
      - proxy

  messenger-worker:
    image: mus-api
    command: php bin/console messenger:consume async --limit=10 --memory-limit=128M
    restart: always
    env_file:
      - ./api/.env
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - MAILER_DSN=${MAILER_DSN}
    depends_on:
      api:
        condition: service_started
      db:
        condition: service_healthy

  web:
    build:
      context: ./web
      dockerfile: Dockerfile.prod
    restart: always
    depends_on:
      - api
    ports:
      - "8000:80"
    expose:
      - "80"
    networks:
      internal:
        aliases:
          - mus-web-internal
      proxy:
        aliases:
          - mus-web

  mercure:
    image: dunglas/mercure
    restart: always
    ports:
      - "8002:3000"
    environment:
      # SERVER_NAME must be set to :3000 as requested for NPM forward port
      SERVER_NAME: :3000
      MERCURE_PUBLISHER_JWT_KEY: ${MERCURE_JWT_SECRET}
      MERCURE_SUBSCRIBER_JWT_KEY: ${MERCURE_JWT_SECRET}
      # Extra directives as requested
      MERCURE_EXTRA_DIRECTIVES: |
        cors_origins https://musmanager.com
        anonymous 1
        subscriptions 1
    # No ports mapping as requested, reachable only via internal network
    networks:
      - internal
      - proxy

# In Nginx Proxy Manager, create a Proxy Host for Mercure with:
# - Domain: yourdomain.com (or a subdomain like mercure.yourdomain.com)
# - Forward Hostname: mercure (Docker container name)
# - Forward Port: 3000
# - Enable SSL with Let's Encrypt
# - In "Advanced" tab, add these custom Nginx directives:
#     proxy_set_header Connection '';
#     proxy_http_version 1.1;
#     proxy_buffering off;
#     proxy_cache off;
#     proxy_read_timeout 24h;
#     chunked_transfer_encoding on;

networks:
  internal:
    driver: bridge
  proxy:
    external: true
    name: mus_proxy

volumes:
  db_data:
  api_var:
  uploads_data: