services:
  api:
    build:
      context: ./api
      dockerfile: Dockerfile.prod
    restart: always
    environment:
      DATABASE_URL: sqlite:///%kernel.project_dir%/var/data.db
      DEFAULT_URI: https://musmanager.com
      APP_ENV: prod
      APP_DEBUG: 0
      APP_SECRET: ${APP_SECRET:-PleaseChangeMeToSomethingSecure}
    volumes:
      - api_var:/var/www/html/var
    networks:
      - internal
      - proxy

  web:
    build:
      context: ./web
      dockerfile: Dockerfile.prod
    restart: always
    depends_on:
      - api
    networks:
      - proxy

  proxy:
    image: jc21/nginx-proxy-manager:latest
    restart: always
    ports:
      - "80:80"
      - "443:443"
      - "81:81"
    volumes:
      - proxy_data:/data
      - proxy_letsencrypt:/etc/letsencrypt
    networks:
      - proxy

networks:
  internal:
    driver: bridge
  proxy:
    driver: bridge

volumes:
  api_var:
  proxy_data:
  proxy_letsencrypt:
