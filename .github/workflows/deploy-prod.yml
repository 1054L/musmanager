name: Deploy to Production

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            set -e
            cd /var/www/mus
            
            # 1. Pull latest changes
            echo "Pulling latest changes from main..."
            git pull origin main
            
            # 2. Install PHP dependencies
            echo "Installing composer dependencies..."
            docker compose -f docker-compose.prod.yml run --rm api composer install --no-dev --optimize-autoloader
            
            # 3. Install and build Vue frontend
            echo "Building frontend..."
            docker compose -f docker-compose.prod.yml run --rm web npm ci
            docker compose -f docker-compose.prod.yml run --rm web npm run build
            
            # 4. Build and restart containers
            echo "Restarting containers..."
            docker compose -f docker-compose.prod.yml up -d --build --remove-orphans
            
            # 5. Wait for api container to be ready
            echo "Waiting for API to stabilize..."
            sleep 5
            
            # 6. Run database migrations
            echo "Running migrations..."
            docker compose -f docker-compose.prod.yml exec -T api php bin/console doctrine:migrations:migrate --no-interaction --env=prod
            
            # 7. Clear and warmup cache
            echo "Clearing and warming up cache..."
            docker compose -f docker-compose.prod.yml exec -T api php bin/console cache:clear --env=prod
            docker compose -f docker-compose.prod.yml exec -T api php bin/console cache:warmup --env=prod

      - name: Notify Status
        if: always()
        run: |
          if [ "${{ job.status }}" == "success" ]; then
            echo "🚀 Deployment to Production SUCCEEDED"
          else
            echo "❌ Deployment to Production FAILED"
          fi
