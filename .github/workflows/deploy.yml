name: Deploy to Production

on:
  push:
    branches:
      - main  # o master, el que uses

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            cd /var/www/mus
            git pull
            docker-compose -f docker-compose.prod.yml up -d --build api
            docker exec mus-api-1 php bin/console doctrine:migrations:migrate --no-interaction
            docker exec mus-api-1 php bin/console cache:clear --env=prod
            docker exec mus-api-1 php bin/console cache:warmup --env=prod
