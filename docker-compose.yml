services:
  database:
    image: mysql:8.0
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE:-app}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-!ChangeMe!}
      MYSQL_USER: ${MYSQL_USER:-app}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-!ChangeMe!}
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 5s
      retries: 5
      start_period: 60s
    volumes:
      - database_data:/var/lib/mysql:rw
    ports:
      - "3380:3306"

  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    ports:
      - "8002:80"
    environment:
      DATABASE_URL: mysql://${MYSQL_USER:-app}:${MYSQL_PASSWORD:-!ChangeMe!}@database:3306/${MYSQL_DATABASE:-app}?serverVersion=8.0.32&charset=utf8mb4
      APP_ENV: dev
      APP_SECRET: abcdefg123456
      DEFAULT_URI: http://localhost:5173
      MESSENGER_TRANSPORT_DSN: doctrine://default?auto_setup=0
    volumes:
      - ./api:/var/www/html
      - api_vendor:/var/www/html/vendor
    depends_on:
      database:
        condition: service_healthy

  web:
    build:
      context: ./web
      dockerfile: Dockerfile
    ports:
      - "5173:5173"
    volumes:
      - ./web:/app
      - web_node_modules:/app/node_modules
    environment:
      - VITE_PORT=5173
      - VITE_API_BASE_URL=http://localhost:8002
      - VITE_MERCURE_URL=http://localhost:8081/.well-known/mercure
    depends_on:
      - api

  mercure:
    image: dunglas/mercure
    restart: unless-stopped
    environment:
      # SERVER_NAME must be set to :80 or :443 for Mercure to listen on these ports
      SERVER_NAME: :80
      MERCURE_PUBLISHER_JWT_KEY: "!ChangeMeMercurePublisherJWTKey!"
      MERCURE_EXTRA_DIRECTIVES: |
        anonymous
        demo
        cors_origins http://localhost:5173 http://127.0.0.1:5173 http://localhost:8002
      # Keep CORS_ALLOWED_ORIGINS for double safety
      CORS_ALLOWED_ORIGINS: "*"
    ports:
      - "8081:80"

volumes:
  database_data:
  web_node_modules:
  api_vendor:
